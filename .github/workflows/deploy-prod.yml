name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FIREBASE_PROJECT: ultimate-booking-prod

jobs:
  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: demo-key
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: localhost
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: test-project
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: test.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "123"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:123:web:abc"
          NEXT_PUBLIC_USE_EMULATORS: "false"

      - name: Build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.PROD_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.PROD_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ env.FIREBASE_PROJECT }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.PROD_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.PROD_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.PROD_FIREBASE_APP_ID }}
          NEXT_PUBLIC_USE_EMULATORS: "false"
          NEXT_PUBLIC_APP_URL: https://bookly.com
          NEXT_PUBLIC_APP_NAME: Bookly
        run: npm run build

      - name: Install Functions dependencies
        working-directory: functions
        run: npm ci

      - name: Deploy to Firebase Production
        uses: w9jds/firebase-action@master
        with:
          args: deploy --project ${{ env.FIREBASE_PROJECT }} --only hosting,functions,firestore,storage
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          RESEND_API_KEY: ${{ secrets.PROD_RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.PROD_EMAIL_FROM }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Production deployment failed! Investigate immediately."

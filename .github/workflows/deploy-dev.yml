name: Deploy to Dev

on:
  push:
    branches: [develop]
  workflow_dispatch:

env:
  FIREBASE_PROJECT: ultimate-booking-dev

jobs:
  deploy:
    name: Deploy Dev
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.DEV_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.DEV_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ env.FIREBASE_PROJECT }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.DEV_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.DEV_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.DEV_FIREBASE_APP_ID }}
          NEXT_PUBLIC_USE_EMULATORS: "false"
          NEXT_PUBLIC_APP_URL: ${{ secrets.DEV_APP_URL }}
          NEXT_PUBLIC_APP_NAME: "Bookly Dev"
        run: npm run build

      - name: Install Functions dependencies
        working-directory: functions
        run: npm ci

      - name: Deploy to Firebase
        uses: w9jds/firebase-action@master
        with:
          args: deploy --project ${{ env.FIREBASE_PROJECT }} --only hosting,functions,firestore,storage
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          RESEND_API_KEY: ${{ secrets.DEV_RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.DEV_EMAIL_FROM }}
